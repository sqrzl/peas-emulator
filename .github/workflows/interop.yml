name: Interop

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Rust interop smoke tests
        run: cargo test --test interop_s3 --test interop_azure --test interop_gcs --test interop_oci --test interop_auth
