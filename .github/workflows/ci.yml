name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Rust toolchain
        run: rustup update stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Install cntryl-tools
        run: cargo install --git https://github.com/cntryl/tools --locked

      - name: Validate Test Structure
        run: cntryl-tools validate-tests

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets --all-features

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install SDK test dependencies
        run: python -m pip install -e ".[sdk-tests]"

      - name: SDK certification tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Test
        working-directory: ui
        run: npm test

      - name: Build
        working-directory: ui
        run: npm run build

  container-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t peas-emulator:smoke .

      - name: Start container
        run: |
          docker run --rm -d \
            --name peas-emulator-smoke \
            -p 9000:9000 \
            -p 9001:9001 \
            peas-emulator:smoke

      - name: Wait for health
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9000/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs peas-emulator-smoke
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install SDK test dependencies
        run: python -m pip install -e ".[sdk-tests]"

      - name: Run S3 SDK container smoke
        env:
          PEAS_API_URL: http://127.0.0.1:9000
          PEAS_SDK_PROVIDERS: s3
        run: python -m pytest sdk-tests/test_s3_sdk.py::test_s3_core_bucket_object_and_metadata_workflows

      - name: Stop container
        if: always()
        run: docker rm -f peas-emulator-smoke || true
