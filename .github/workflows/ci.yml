name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compatibility matrix
        run: cargo test compatibility_matrix_should_use_checked_schema_and_known_verifiers

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  interop:
    uses: ./.github/workflows/interop.yml
